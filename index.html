<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tee Reader — Read with me</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f4;--surface:#ffffff;--surface2:#f3f0e8;
  --ink:#1c1810;--ink2:#5a5040;--ink3:#9a8f7a;
  --border:#e0d8c8;--border2:#c8bca8;
  --gold:#a07830;--gold-light:#e8d8b0;--gold-pale:#faf3e0;
  --pur:#7c3aed;--pur-hover:#6d28d9;--pur-light:#ede9fe;--pur-border:#c4b5fd;
  --r:12px;
  --success-bg:#e8f0ec;--success-text:#2d4a3e;
  --danger-bg:#f5e8e8;--danger-text:#7a2020;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);margin:0}
#wrap{display:flex;min-height:100vh}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,.25)}50%{box-shadow:0 0 0 6px rgba(124,58,237,0)}}
.anim{animation:fadeUp .3s ease both}
.a1{animation-delay:.05s}.a2{animation-delay:.1s}.a3{animation-delay:.15s}.a4{animation-delay:.2s}.a5{animation-delay:.25s}.a6{animation-delay:.3s}.a7{animation-delay:.35s}.a8{animation-delay:.4s}

/* SIDEBAR */
#sidebar{width:215px;min-width:215px;background:var(--surface);border-right:0.5px solid var(--border);display:flex;flex-direction:column;min-height:100vh}
.sb-head{padding:1.25rem 1rem 1rem;border-bottom:0.5px solid var(--border)}
.sb-head h1{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--ink);letter-spacing:.5px}
.sb-head .slogan{font-size:.7rem;color:var(--pur);margin-top:3px;font-style:italic;font-family:'Playfair Display',serif;letter-spacing:.3px}
.sb-head .count{font-size:.62rem;color:var(--ink3);margin-top:5px;text-transform:uppercase;letter-spacing:.4px}
.sb-label{font-size:.62rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink3);padding:.9rem 1rem .4rem;font-weight:500}

/* NAV ITEMS */
.ni{display:flex;align-items:center;gap:8px;padding:.55rem 1rem;cursor:pointer;border-left:2.5px solid transparent;transition:background .2s,border-color .2s,transform .18s;position:relative;overflow:hidden}
.ni::after{content:'';position:absolute;inset:0;background:var(--pur-light);opacity:0;transition:opacity .2s;pointer-events:none}
.ni:hover{transform:translateX(4px);border-left-color:var(--pur-border)}
.ni:hover::after{opacity:1}
.ni:hover .nl{color:var(--pur)}
.ni:hover .dot{transform:scale(1.4)}
.ni.active{background:var(--pur-light);border-left-color:var(--pur)}
.ni.active .nl{color:var(--pur);font-weight:500}
.ni.active .dot{transform:scale(1.25)}
.ni .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:transform .18s;position:relative;z-index:1}
.ni .nl{font-size:.75rem;color:var(--ink2);line-height:1.3;position:relative;z-index:1;transition:color .18s}
.ni .ng{font-size:.62rem;color:var(--ink3);margin-top:1px;position:relative;z-index:1}
.sb-foot{margin-top:auto;padding:.9rem 1rem;border-top:0.5px solid var(--border)}
.sb-foot p{font-size:.68rem;color:var(--ink3);line-height:1.55}
.copy{font-size:.62rem;color:var(--ink3);margin-top:.4rem;padding-top:.4rem;border-top:0.5px solid var(--border)}

/* MAIN */
#main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:.75rem;padding:.85rem 1.5rem;border-bottom:0.5px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.topbar-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}

/* TABS */
.tabs{display:flex;gap:4px}
.tab{font-size:.73rem;padding:5px 14px;border-radius:20px;cursor:pointer;border:0.5px solid var(--border2);background:transparent;color:var(--ink2);font-family:'Inter',sans-serif;transition:all .18s;position:relative;overflow:hidden}
.tab::before{content:'';position:absolute;inset:0;background:var(--pur-light);opacity:0;transition:opacity .18s;border-radius:20px;pointer-events:none}
.tab:hover{transform:translateY(-2px);border-color:var(--pur-border);color:var(--pur);box-shadow:0 3px 10px rgba(124,58,237,.15)}
.tab:hover::before{opacity:1}
.tab:active{transform:scale(.95) translateY(0)!important}
.tab.on{background:var(--pur);color:#fff;border-color:var(--pur);box-shadow:0 2px 8px rgba(124,58,237,.3);animation:pulse 2.5s ease infinite}
.tab.on::before{opacity:0}
.tab.on:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(124,58,237,.4)}

.prog-track{height:2px;background:var(--border)}
.prog-fill{height:2px;background:var(--pur);transition:width .4s ease}
#content{flex:1}

/* HOME */
#home{padding:2rem 1.5rem}
.hero{margin-bottom:1.75rem}
.hero h2{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--ink);line-height:1.25}
.hero p{font-size:.85rem;color:var(--ink2);margin-top:.4rem;line-height:1.6}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem}
.tile{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s}
.tile:hover{transform:translateY(-5px);border-color:var(--pur-border);box-shadow:0 8px 24px rgba(124,58,237,.12)}
.tile:active{transform:translateY(-2px)}
.tcover{height:115px;display:flex;align-items:flex-end;padding:.7rem;position:relative}
.tcover-badge{position:absolute;top:8px;right:8px;font-size:.58rem;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,.88);color:#333;font-weight:500;font-family:'Inter',sans-serif}
.ttitle{font-family:'Playfair Display',serif;font-size:.8rem;font-weight:700;color:#fff;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.tinfo{padding:.7rem}
.tauthor{font-size:.67rem;color:var(--ink3);margin-bottom:.3rem}
.tgenre{font-size:.62rem;padding:2px 8px;border-radius:20px;display:inline-block}

/* READER */
#reader-pane,#summary-pane,#quiz-pane{display:none}
.rprose{max-width:640px;margin:0 auto;padding:2rem 1.5rem}
.rprose h2{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:500;color:var(--ink);margin:1.75rem 0 .75rem;padding-top:1.25rem;border-top:0.5px solid var(--border)}
.rprose h2:first-child{border:none;margin-top:0;padding-top:0}
.rprose p{font-family:'Playfair Display',serif;font-size:1rem;line-height:1.9;color:#2c2418;margin-bottom:1.1rem}
.done-bar{max-width:640px;margin:0 auto 2rem;padding:1.25rem;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);text-align:center}
.done-bar p{font-size:.83rem;color:var(--ink2);margin-bottom:.75rem}
.brow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

/* BUTTONS */
.btn{padding:9px 26px;border-radius:24px;font-size:.8rem;font-family:'Inter',sans-serif;cursor:pointer;font-weight:400;border:none;transition:transform .18s,box-shadow .18s,background .18s,color .18s;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.15);opacity:0;transition:opacity .18s;pointer-events:none}
.btn:hover::after{opacity:1}
.btn:active{transform:scale(.95)!important}
.btn-p{background:var(--pur);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.25)}
.btn-p:hover{background:var(--pur-hover);transform:translateY(-2px);box-shadow:0 6px 18px rgba(124,58,237,.35)}
.btn-o{background:transparent;color:var(--pur);border:0.5px solid var(--pur-border)}
.btn-o:hover{background:var(--pur-light);transform:translateY(-2px);box-shadow:0 4px 12px rgba(124,58,237,.12);border-color:var(--pur)}

/* SUMMARY */
#summary-pane{padding:1.5rem}
.sbk{display:flex;gap:1rem;align-items:flex-start;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:0.5px solid var(--border)}
.scov{width:54px;height:70px;border-radius:6px;flex-shrink:0}
.sbk h2{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--ink)}
.sbk .sby{font-size:.73rem;color:var(--ink3);margin-top:3px}
.scard{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1.1rem;margin-bottom:.8rem}
.slabel{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);font-weight:500;margin-bottom:.6rem}
.scard p{font-size:.87rem;color:var(--ink2);line-height:1.7}
.trow{display:flex;flex-wrap:wrap;gap:6px}
.tpill{font-size:.71rem;padding:4px 12px;background:var(--pur-light);color:var(--pur);border:0.5px solid var(--pur-border);border-radius:20px;transition:background .15s,transform .15s,box-shadow .15s;cursor:default}
.tpill:hover{background:var(--pur-border);transform:scale(1.06);box-shadow:0 2px 8px rgba(124,58,237,.15)}
.qblock{border-left:2.5px solid var(--pur);padding:.75rem 1rem;margin-bottom:.65rem;background:var(--pur-light);border-radius:0 6px 6px 0}
.qblock p{font-family:'Playfair Display',serif;font-style:italic;font-size:.9rem;color:var(--ink);line-height:1.65}
.qattr{font-size:.68rem;color:var(--ink3);margin-top:.4rem;font-style:normal;font-family:'Inter',sans-serif}

/* QUIZ */
#quiz-pane{padding:1.5rem;max-width:600px;margin:0 auto}
.qztop{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.qzctr{font-size:.73rem;color:var(--ink3);font-weight:500}
.qzlive{font-size:.73rem;color:var(--pur);font-weight:500;background:var(--pur-light);padding:3px 11px;border-radius:20px}
.qzq{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--ink);line-height:1.6;margin-bottom:1.15rem}
.obt{width:100%;text-align:left;padding:.82rem 1rem;border:0.5px solid var(--border2);border-radius:10px;font-size:.84rem;cursor:pointer;background:var(--surface);color:var(--ink);font-family:'Inter',sans-serif;margin-bottom:.5rem;transition:all .16s;display:flex;align-items:center;gap:9px}
.obt:hover:not(.lk){background:var(--pur-light);border-color:var(--pur-border);transform:translateX(4px);box-shadow:0 2px 10px rgba(124,58,237,.1)}
.obt:hover:not(.lk) .oltr{background:var(--pur);border-color:var(--pur);color:#fff;opacity:1}
.obt.ok{background:var(--success-bg);border-color:#2d4a3e;color:var(--success-text)}
.obt.no{background:var(--danger-bg);border-color:#7a2020;color:var(--danger-text)}
.obt.lk{cursor:default}
.oltr{width:22px;height:22px;border-radius:50%;border:0.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.68rem;flex-shrink:0;opacity:.55;transition:all .16s}
.fb{padding:.85rem 1rem;border-radius:8px;font-size:.82rem;line-height:1.55;margin-top:.7rem;display:none}
.fb.ok{background:var(--success-bg);color:var(--success-text)}
.fb.no{background:var(--danger-bg);color:var(--danger-text)}
.qnav{display:none;justify-content:flex-end;margin-top:1rem}
.scoreend{text-align:center;padding:3rem 1rem;animation:fadeUp .4s ease both}
.sbig{font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:700;color:var(--pur)}
.smsg{font-size:.9rem;color:var(--ink2);margin-top:.5rem}
.spct{font-size:.73rem;color:var(--ink3);margin-top:.25rem}
</style>
</head>
<body>
<div id="wrap">
  <div id="sidebar">
    <div class="sb-head">
      <h1>Tee Reader</h1>
      <div class="slogan">Read with me</div>
      <div class="count">8 novels</div>
    </div>
    <div class="sb-label">Shelf</div>
    <div class="ni active" onclick="showHome()" id="nav-home">
      <div class="dot" style="background:var(--pur)"></div>
      <div><div class="nl">All novels</div></div>
    </div>
    <div class="sb-label" style="margin-top:.4rem">Your books</div>
    <div id="book-nav"></div>
    <div class="sb-foot">
      <p>Tap a novel to read, explore its summary, or take a quiz.</p>
      <div class="copy">&copy; <span id="yr"></span> Developed by Umar Ahmad</div>
    </div>
  </div>

  <div id="main">
    <div class="topbar">
      <div class="topbar-title" id="top-title">My Reading Shelf</div>
      <div class="tabs" id="tab-strip" style="display:none">
        <button class="tab on" onclick="sw('read')">Read</button>
        <button class="tab" onclick="sw('summary')">Summary</button>
        <button class="tab" onclick="sw('quiz')">Quiz</button>
      </div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog" style="width:0%"></div></div>
    <div id="content">
      <div id="home">
        <div class="hero anim"><h2>Welcome back, reader.</h2><p>Eight novels — pick one to begin.</p></div>
        <div class="grid" id="book-grid"></div>
      </div>
      <div id="reader-pane"></div>
      <div id="summary-pane"></div>
      <div id="quiz-pane"></div>
    </div>
  </div>
</div>

<script>
document.getElementById('yr').textContent=new Date().getFullYear();
const BOOKS=[
{id:0,title:"Eze Goes to School",author:"Onuora Nzekwu & Michael Crowder",genre:"Classic · Children",clr:"#6b4c2a",
summary:{ov:"Eze Adi is a poor but determined boy from a humble Nigerian village whose greatest wish is an education. His journey — marked by worn clothes, empty lunch pails, and a mother who sells her wedding earrings — is a testament to sacrifice and grit.",themes:["Education","Perseverance","Family Sacrifice","Self-Belief","Community"],msg:"The novel celebrates the transformative power of education. Eze's journey tells young readers that no obstacle is too great when you refuse to stop walking.",quotes:[{t:"Education is the key to success. Not money. Not connections. Knowledge.",a:"Eze Adi"},{t:"Though not the best in class at the beginning, his determination started to pay off.",a:"Narrator"},{t:"I am ready.",a:"Eze, to his father"}]},
content:`<h2>Background</h2><p>Eze Adi comes from a poor family in a humble Nigerian village. His father, despite financial struggles, believes deeply in the power of education and sacrifices greatly to send Eze to school.</p><h2>Challenges at school</h2><p>At his first school, Eze faces many difficulties — he has no proper school supplies, wears worn clothes, and sometimes goes without lunch. He struggles with learning at first because he has never been to school before.</p><h2>Perseverance and determination</h2><p>Eze is hardworking and refuses to give up. He studies hard, asks questions, and slowly improves. He makes friends along the way and shows remarkable leadership qualities.</p><h2>School success</h2><p>Though not the best in class at the beginning, Eze's determination starts to pay off. His teachers notice his effort and he earns better grades over time.</p><h2>Overall message</h2><p>The novel celebrates the power of education and hard work. Eze's journey encourages young readers to value school and to work persistently toward their goals, no matter the obstacles.</p>`,
quiz:[{q:"What is Eze Adi's greatest wish?",opts:["Become a trader","Get an education","Leave his village","Become a soldier"],a:1,e:"Eze's greatest wish is to receive an education, despite his family's financial difficulties."},{q:"Why does Eze struggle at school initially?",opts:["He is lazy","He has no friends","He has never been to school","He dislikes teachers"],a:2,e:"Eze has never been to school before, making the learning environment entirely new and challenging."},{q:"Who sacrifices most to ensure Eze attends school?",opts:["His uncle","His teachers","His father","His neighbours"],a:2,e:"Eze's father sacrifices greatly despite the family's financial struggles."},{q:"What quality drives Eze's improvement?",opts:["Charm","Determination","Wealth","Luck"],a:1,e:"Eze's determination and refusal to give up drives his improvement."},{q:"What is the central theme?",opts:["War and conflict","Love and romance","Education and perseverance","Adventure"],a:2,e:"The central theme is the value of education and perseverance in the face of hardship."}]},
{id:1,title:"The Light Beyond the Dust",author:"AI-generated",genre:"Inspirational · Fiction",clr:"#7a3a1a",
summary:{ov:"Set in northern Nigeria, this story follows Sadiq Musa — a boy born into poverty in Kafin Daji — as he walks seven kilometres to school every day, earns a scholarship, and returns as a civil engineer to build a bridge and school for his community.",themes:["Education","Resilience","Sacrifice","Dreams","Community"],msg:"True success is not born from wealth or privilege, but from the willingness to walk the hard road.",quotes:[{t:"Education is the key to success. Not money. Not connections. Knowledge.",a:"Engineer Sadiq Musa"},{t:"You have something special. If you continue like this, you will go far.",a:"Mr. Okonkwo"},{t:"Education opened the door. It gave me confidence. It gave me a voice.",a:"Sadiq"}]},
content:`<h2>Chapter One: The boy who dreamed big</h2><p>In the quiet village of Kafin Daji in northern Nigeria, lived a young boy named Sadiq Musa. His father was a petty trader and his mother made local snacks. But inside their modest mud home lived something powerful — hope. Sadiq wanted to become an engineer and build bridges in Abuja.</p><h2>Chapter Two: The long walk</h2><p>There was no secondary school in Kafin Daji. The nearest one was seven kilometres away. Every morning before sunrise, Sadiq walked the long dusty road. Sometimes he went without breakfast. Sometimes the rain soaked his only uniform. But Sadiq never stopped walking. His mathematics teacher, Mr. Okonkwo, told him: "You have something special. If you continue like this, you will go far."</p><h2>Chapter Three: Trials and temptations</h2><p>As years passed, challenges grew heavier. His father's business began to fail. His mother suggested selling her only gold earrings — her wedding gift. The next day, she did. From that moment, he studied harder than ever before.</p><h2>Chapter Four: The scholarship</h2><p>In his final year, the state government announced a scholarship exam. Sadiq prepared day and night under a flickering kerosene lamp. When results came, Sadiq Musa ranked first in the entire district. The scholarship covered his tuition at a university in Abuja to study Civil Engineering.</p><h2>Chapter Five: The transformation</h2><p>University life was demanding but Sadiq had something stronger — resilience. He graduated with First Class Honours. Years later, Engineer Sadiq Musa returned to Kafin Daji to build a modern bridge and a secondary school for his community. "Education opened the door," he told the villagers. "It gave me a voice."</p>`,
quiz:[{q:"Where is the village Sadiq comes from?",opts:["Abuja","Kafin Daji","Gidan Rana","Kaduna"],a:1,e:"Sadiq comes from the quiet village of Kafin Daji in northern Nigeria."},{q:"How far did Sadiq walk to school?",opts:["2 km","5 km","7 km","10 km"],a:2,e:"The nearest secondary school was seven kilometres from Kafin Daji."},{q:"What did Sadiq's mother sacrifice for school fees?",opts:["Her sewing machine","Her gold earrings","Her savings","Her farmland"],a:1,e:"Sadiq's mother sold her gold earrings — a wedding gift — to cover his fees."},{q:"What did Sadiq rank in the scholarship exam?",opts:["Third in state","First in district","Second nationally","First in school"],a:1,e:"Sadiq Musa ranked first in the entire district."},{q:"What did Sadiq build when he returned home?",opts:["Hospital and mosque","Road and market","Bridge and secondary school","Factory and well"],a:2,e:"Engineer Sadiq returned to build a modern bridge and a secondary school for his community."}]},
{id:2,title:"When the Baobab Bloomed",author:"AI-generated",genre:"Romance · Literary",clr:"#2d5a3a",
summary:{ov:"A Nigerian romance set across Kano, Kaduna, and Abuja. Zainab Bello and Idris Abdullahi meet at a youth conference and build a love grounded not in butterflies, but in respect, patience, and shared purpose.",themes:["Love","Trust","Communication","Ambition","African Identity"],msg:"In Africa, love is not loud. It is steady. It grows like the baobab — deep roots, wide shade, lasting generations.",quotes:[{t:"Love is not enough. Respect and growth must follow.",a:"Idris Abdullahi"},{t:"When the baobab blooms, it means something rare and beautiful has happened.",a:"Idris, at the proposal"},{t:"Love is not butterflies. It is commitment.",a:"Idris Abdullahi"}]},
content:`<h2>Chapter One: The girl with the golden voice</h2><p>In the ancient city of Kano, lived Zainab Bello — a final-year Mass Communication student at Bayero University Kano. She was known for her intelligence and her rich, warm singing voice. But beneath her confidence, she carried a quiet fear. Love had disappointed her before.</p><h2>Chapter Two: The boy who read under streetlights</h2><p>Idris Abdullahi grew up in Kaduna, raised by a widowed mother. He studied Mechanical Engineering at Ahmadu Bello University. Their paths crossed at a youth leadership conference in Abuja where Idris was presenting a project on renewable energy. When he spoke, something stirred in Zainab — admiration.</p><h2>Chapter Three: Distance and determination</h2><p>After the conference, calls turned into long conversations and shared dreams. They spoke about building careers before building a home. "Love is not enough," Idris said. "Respect and growth must follow."</p><h2>Chapter Four: Tested by fire</h2><p>During NYSC, Idris was posted to Plateau State. Rumours reached Zainab. Instead of assuming, she travelled to see him. They sat beneath a large baobab tree. "I need honesty," she said. He explained everything. They made a promise: transparency before suspicion.</p><h2>Chapter Five: The proposal</h2><p>Five years later, Idris called Zainab forward at the commissioning of his first solar-powered community project. "When the baobab blooms, it means something rare and beautiful has happened." He turned to her. "Zainab Bello, will you marry me?" Tears filled her eyes as the crowd cheered.</p><h2>Chapter Six: A love rooted in purpose</h2><p>Their wedding blended Hausa traditions, colourful aso-ebi, and drums echoing joy. Years later, sitting together as their children played, Idris said: "Love is not butterflies. It is commitment." And it bloomed — lasting and wide.</p>`,
quiz:[{q:"Where does Zainab Bello study?",opts:["University of Lagos","Ahmadu Bello University","Bayero University Kano","University of Ibadan"],a:2,e:"Zainab is a final-year student at Bayero University Kano."},{q:"Where do Zainab and Idris first meet?",opts:["A wedding in Kano","A youth conference in Abuja","A market in Kaduna","Zainab's university"],a:1,e:"Their paths cross at a youth leadership conference in Abuja."},{q:"How does Zainab respond to the rumours about Idris?",opts:["Ends the relationship","Ignores them","Travels to confront him","Asks friends to investigate"],a:2,e:"Zainab travels to Plateau State to speak with Idris directly."},{q:"What does the baobab tree symbolise?",opts:["Death and sorrow","Danger","Rare, enduring love","Fame and success"],a:2,e:"The baobab symbolises something rare and beautiful."},{q:"According to Idris, what is love?",opts:["Butterflies and excitement","Fame","Commitment and respect","Distance"],a:2,e:"Idris says love is not butterflies — it is commitment."}]},
{id:3,title:"Things Fall Apart",author:"Chinua Achebe",genre:"Classic · African Lit",clr:"#4a3060",
summary:{ov:"One of Africa's greatest novels. Okonkwo — a proud Igbo warrior — watches his world torn apart by colonial missionaries and the inevitable changes they bring to Umuofia's traditional society.",themes:["Identity","Colonialism","Tradition vs Change","Masculinity","Fate"],msg:"The collapse of a man who cannot bend is also the collapse of a world that could not adapt.",quotes:[{t:"Until the lions have their own historians, the history of the hunt will always glorify the hunter.",a:"Chinua Achebe"},{t:"Age was respected among his people, but achievement was revered.",a:"Narrator"},{t:"When the moon is shining the cripple becomes hungry for a walk.",a:"Igbo proverb"}]},
content:`<h2>Part One: The rise of Okonkwo</h2><p>Okonkwo is one of the most powerful men in the nine villages of Umuofia. He has built his wealth and reputation through hard work and sheer will, determined to be nothing like his lazy, debt-ridden father Unoka. Yet beneath his iron exterior lives a man haunted by fear — fear of becoming his father.</p><h2>Part Two: Exile</h2><p>During the funeral of a respected elder, Okonkwo's gun accidentally kills the man's son. As is the custom, Okonkwo and his family are exiled for seven years to Mbanta. During his exile, white missionaries arrive. Okonkwo's own son Nwoye becomes a Christian — the ultimate betrayal in Okonkwo's eyes.</p><h2>Part Three: Return and collapse</h2><p>Okonkwo returns to find a village changed beyond recognition. When a church member unmasks a sacred masquerade, Okonkwo and others burn the church. They are arrested and humiliated. Upon release, Okonkwo kills a court messenger. When no one rises to support him, he understands: his world is gone. He goes home and hangs himself.</p><h2>Legacy</h2><p>The District Commissioner considers devoting a paragraph to Okonkwo in his book. Achebe's devastating irony is complete — yet Achebe rescues Okonkwo from that footnote by writing this very novel.</p>`,
quiz:[{q:"What drives Okonkwo's ambition most?",opts:["Love of wealth","Fear of becoming like his father","Desire for power","Hatred of missionaries"],a:1,e:"Okonkwo is fundamentally motivated by terror of becoming like his weak, idle father Unoka."},{q:"Why is Okonkwo exiled from Umuofia?",opts:["He murders a chief","His gun accidentally kills a young man","He converts to Christianity","He refuses to pay debts"],a:1,e:"During a funeral, Okonkwo's gun accidentally kills the son of the deceased."},{q:"What does Okonkwo's son Nwoye do?",opts:["Becomes a thief","Marries into a rival clan","Converts to Christianity","Joins the colonial government"],a:2,e:"Nwoye becomes a Christian — to Okonkwo, a betrayal of everything ancestral."},{q:"How does Things Fall Apart end?",opts:["Okonkwo reclaims his glory","Okonkwo flees to Mbanta","Okonkwo kills the Commissioner","Okonkwo takes his own life"],a:3,e:"After killing a court messenger and seeing no one rise with him, Okonkwo goes home and hangs himself."},{q:"What does the District Commissioner plan to do about Okonkwo?",opts:["Honour him with a memorial","Build a school in his name","Devote a paragraph in his book","Arrest his family"],a:2,e:"The Commissioner plans to give Okonkwo a mere paragraph in his colonial memoir."}]},
{id:4,title:"Purple Hibiscus",author:"Chimamanda Ngozi Adichie",genre:"Literary Fiction · Drama",clr:"#6a2a6a",
summary:{ov:"Fifteen-year-old Kambili lives in a beautiful, silent house in Enugu controlled by her devout, tyrannical father Eugene. When she visits her Aunty Ifeoma in Nsukka, she discovers laughter, freedom, and the first stirrings of her own voice.",themes:["Silence vs Voice","Religious Extremism","Freedom","Coming of Age","Family"],msg:"Freedom is not given — it is discovered, often in the most unlikely places. Purple Hibiscus is a story about a girl learning to speak.",quotes:[{t:"Things are not always as they seem.",a:"Kambili Achike"},{t:"The only truth I know is what I hold onto.",a:"Aunty Ifeoma"},{t:"We cannot trample on the dignity of others.",a:"Eugene — misquoting scripture"}]},
content:`<h2>The silent house</h2><p>Kambili Achike is fifteen years old and speaks in whispers. Her father, Eugene — known publicly as a generous, devout Catholic — rules the family home with an iron fist and a leather belt. Kambili and her brother Jaja have learned to move quietly through the beautiful Enugu house, never drawing attention.</p><h2>Nsukka: a different world</h2><p>When political tension forces the children to stay with Aunty Ifeoma in Nsukka, Kambili enters a different universe. The house is small, noisy, and alive. It is here that Kambili begins to thaw — encountering Father Amadi, a warm young priest, and learning that she is allowed to feel.</p><h2>The purple hibiscus</h2><p>Aunty Ifeoma tends rare purple hibiscus in her garden — defiant flowers that become a symbol of freedom throughout the novel. Jaja eventually brings a cutting home to Enugu, planting something new in the silence.</p><h2>Breaking</h2><p>Eugene's violence escalates. After a miscarriage caused by his beating, Kambili's mother quietly poisons his tea. Eugene dies. Jaja confesses to the murder to protect their mother and goes to prison. Kambili spends years finding her voice. By the novel's end, she speaks — fully, clearly, without whispering.</p>`,
quiz:[{q:"What is Kambili's father Eugene known for publicly?",opts:["Cruelty and corruption","Generosity and devout Catholic faith","Political ambition","Teaching at university"],a:1,e:"Publicly, Eugene is admired as a generous, devout Catholic — a sharp irony given his violence at home."},{q:"What does Kambili discover at Aunty Ifeoma's house?",opts:["Wealth and privilege","Silence and discipline","Laughter, freedom, and her own voice","Her father's secrets"],a:2,e:"Nsukka is loud, loving, and questioning — where Kambili begins to discover she is allowed to feel and speak."},{q:"What do the purple hibiscus flowers symbolise?",opts:["Grief and loss","Tradition and ancestors","Freedom and defiance","Love and marriage"],a:2,e:"The rare purple hibiscus are a recurring symbol of freedom."},{q:"Who confesses to Eugene's murder?",opts:["Kambili","Aunty Ifeoma","Jaja, to protect their mother","Their mother, voluntarily"],a:2,e:"Jaja confesses — actually committed by their mother — out of a deep protective love for her."},{q:"How does Kambili change by the novel's end?",opts:["She becomes violent","She leaves Nigeria","She finds her voice and speaks clearly","She becomes a nun"],a:2,e:"The entire novel traces Kambili's journey from whispering silence to full, clear speech."}]},
{id:5,title:"Sweet Sixteen",author:"Bolaji Abdullahi",genre:"YA Fiction · Nigerian",clr:"#c0533a",badge:"YA",
summary:{ov:"Sweet Sixteen is an epistolary novel told through letters from Aliya's father to her on her sixteenth birthday. It is a tender, witty, and profoundly wise exploration of growing up female in Nigeria — covering beauty standards, peer pressure, faith, ambition, and the meaning of true education.",themes:["Growing Up","Identity","Gender","Education","Parent-Child Bond"],msg:"The most important thing a father can give his daughter is not protection — it is the wisdom and courage to protect herself.",quotes:[{t:"Being sixteen is not an achievement. What you do with sixteen is.",a:"Aliya's Father"},{t:"The world will try to tell you who you are. Your job is to decide whether to agree.",a:"Aliya's Father"},{t:"Read. Not because someone asked you to. Read because the world is too interesting to be ignored.",a:"Aliya's Father"}]},
content:`<h2>The letters begin</h2><p>On the morning of her sixteenth birthday, Aliya receives a most unusual gift from her father — not a phone, not jewellery, but a collection of letters he has written to her over the years. Each letter covers a different topic: her education, her body, her faith, her future, and what it means to grow up as a young woman in Nigeria today.</p><h2>On beauty and identity</h2><p>Her father writes candidly about the trap of beauty standards — the skin-bleaching creams, the pressure to look a certain way, the idea that a woman's worth lives in her appearance. He tells her that the most beautiful thing about her is her mind.</p><h2>On education and ambition</h2><p>One of the most passionate letters is about reading and curiosity. Her father urges her to read not because it is a school requirement but because the world is too interesting to be ignored. He challenges Aliya to join the company of Nigerian women who changed history through knowledge and courage.</p><h2>On peer pressure and friendship</h2><p>Her father addresses the social world of secondary school — the cliques, the gossip, the desperate need to belong. He tells her that the friends worth keeping are the ones who make her more herself, not less.</p><h2>On faith and doubt</h2><p>He does not tell her what to believe. Instead, he tells her that a faith that cannot survive questions is not faith at all — it is fear.</p><h2>The gift</h2><p>By the end of the letters, Aliya understands what her father has given her: not answers, but the tools to find her own. The novel ends with Aliya, sixteen, standing at the edge of her own life — equipped and unafraid.</p>`,
quiz:[{q:"What form does Sweet Sixteen take?",opts:["A diary","A series of letters from father to daughter","A school textbook","A collection of poems"],a:1,e:"The novel is epistolary — structured as a collection of letters written by Aliya's father to her on her sixteenth birthday."},{q:"What does Aliya's father warn her about regarding beauty?",opts:["That beauty is the most important asset","That beauty standards are a trap obscuring a woman's true worth","That she should focus on fashion","That Nigerian men prefer lighter skin"],a:1,e:"Her father writes candidly about the trap of beauty standards and tells Aliya that her mind is her most beautiful feature."},{q:"What does her father say about faith?",opts:["That she must follow the family religion","That faith which cannot survive questions is not faith but fear","That she should avoid religion altogether","That prayer is more important than education"],a:1,e:"He tells her that a faith that cannot survive questions is really fear."},{q:"What kind of friends does Aliya's father say are worth keeping?",opts:["Rich and influential friends","Friends from the same neighbourhood","Friends who make her more herself, not less","Friends who are top of their class"],a:2,e:"He warns her about belonging at the cost of standing out — the friends worth keeping are those who make her more herself."},{q:"What is the central gift the novel suggests a father can give his daughter?",opts:["Wealth and comfort","Wisdom and courage to protect herself","A good marriage","Academic certificates"],a:1,e:"The novel argues the most important gift is not protection but the wisdom and courage to protect herself."}]},
{id:6,title:"The Lekki Headmaster",author:"Kabir Alabi Garba",genre:"JAMB 2025 · Educational",clr:"#1a4a6a",badge:"JAMB",
summary:{ov:"The official JAMB 2025/2026 UTME novel. The Lekki Headmaster follows Mr. Bepo Adewale, a passionate headmaster of Stardom Schools in Lagos, as he battles systemic challenges, corrupt administrators, and societal apathy to deliver quality education.",themes:["Education","Leadership","Integrity","Nigerian Society","Institutional Reform"],msg:"True leadership is not about titles — it is about sacrifice in the face of resistance.",quotes:[{t:"A school without discipline is a farm without a fence.",a:"Mr. Bepo Adewale"},{t:"Every child deserves a teacher who refuses to give up.",a:"Mr. Bepo Adewale"},{t:"The headmaster who bends for money will break the children.",a:"Mr. Bepo, to the board"}]},
content:`<h2>Introduction: The man and the school</h2><p>Mr. Bepo Adewale is the headmaster of Stardom Schools in the Lekki area of Lagos. On the surface, Stardom is a private school with reasonable fees and a reputation worth protecting. Beneath the surface, it is an institution battling poor infrastructure, underpaid teachers, grade-chasing parents, and a board of governors more interested in profit than in pupils.</p><h2>The challenges of leadership</h2><p>Mr. Bepo's greatest battles are not with the students — they are with the system. Teachers who are burned out and underpaid. Parents who want results without effort. A school proprietor who considers examination malpractice a reasonable business strategy. Mr. Bepo navigates each of these with firmness and an unshakeable belief that education must not be compromised.</p><h2>The students at the centre</h2><p>Two students anchor the novel's emotional core: Tobi, a brilliant boy from a poor background whose school fees are perpetually in arrears, and Sade, a girl whose parents are pressuring her to drop her dream of studying medicine. Mr. Bepo fights quietly for both of them.</p><h2>Corruption and pressure</h2><p>A government inspection looms. The proprietor pressures Mr. Bepo to falsify records and coach students on examination questions. Mr. Bepo refuses. The confrontation that follows forces every staff member to choose a side.</p><h2>Resolution</h2><p>The inspection team arrives and finds Stardom Schools not perfect, but honest. The inspector's report notes the integrity of the headmaster as a distinguishing feature. Tobi wins a scholarship. Sade is allowed to pursue medicine. Mr. Bepo remains at his desk — not because the battle is won, but because it must be fought.</p>`,
quiz:[{q:"Who is the central character of The Lekki Headmaster?",opts:["A government inspector","Mr. Bepo Adewale, a headmaster","Tobi, a scholarship student","The school proprietor"],a:1,e:"Mr. Bepo Adewale, the dedicated headmaster of Stardom Schools, is the novel's central character."},{q:"What is the school proprietor's attitude toward examination malpractice?",opts:["He strongly opposes it","He considers it a reasonable business strategy","He is unaware it happens","He reports it to the government"],a:1,e:"The proprietor views examination malpractice as a practical business strategy."},{q:"What challenge does the student Tobi face?",opts:["He is academically weak","His school fees are perpetually in arrears","He wants to drop out","He is involved in cultism"],a:1,e:"Tobi is brilliant but from a poor background, with school fees always in arrears."},{q:"Why does the government inspection end positively for Mr. Bepo?",opts:["He bribed the inspectors","The school achieved perfect results","The inspector notes his integrity","The proprietor intervened"],a:2,e:"The inspector's report specifically notes the headmaster's integrity."},{q:"What does The Lekki Headmaster suggest about true leadership?",opts:["Leadership is about authority","True leadership is sacrifice in the face of resistance","Leaders must be wealthy","Leadership requires political connections"],a:1,e:"The novel argues that true leadership is not about titles but about sacrifice."}]},
{id:7,title:"The Life Changer",author:"Khadija Abubakar Jalli",genre:"JAMB 2024 · Campus Life",clr:"#3a5a2a",badge:"JAMB",
summary:{ov:"The previous JAMB recommended novel. The Life Changer follows Salma, a young girl admitted to study Law at Ahmadu Bello University, narrated by her mother Ummi who weaves in stories of her own campus experiences.",themes:["Campus Life","Temptation","Parental Guidance","Choices","Consequences"],msg:"University is not a destination — it is a crucible. The choices you make in those years will change your life.",quotes:[{t:"The university is a place where your character is tested, not just your intelligence.",a:"Ummi"},{t:"Bad friends are like bad weather. You don't notice the damage until the storm has passed.",a:"Ummi"},{t:"The life changer is not the university. It is the choices you make inside it.",a:"Narrator"}]},
content:`<h2>Ummi's voice</h2><p>The Life Changer is narrated by Ummi, a mother who decides to prepare her children for university life by telling them her own stories. Her audience is primarily Omar, her son who has just gained admission to Ahmadu Bello University — the same institution his sister Salma attends.</p><h2>Salma's journey</h2><p>Salma begins university as a naive, hopeful girl studying Law. Her early experiences are shaped by her roommates — each representing a different path: the hardworking student, the girl who trades grades for favour, the one who falls into cultism, and the one who simply gives up.</p><h2>The temptations of campus life</h2><p>The novel is unflinching about the realities Ummi describes: sexual harassment from lecturers, examination malpractice rings, drug abuse in hostels, and the social media spiral that pulls students away from study. Ummi presents these not as distant dangers but as everyday choices.</p><h2>Omar's admission</h2><p>As Ummi tells her stories, Omar prepares to join the same university. His preparation is different from most — he arrives knowing the terrain. The novel suggests that the best defence against campus corruption is not innocence but knowledge.</p><h2>The life changer</h2><p>The novel closes with the argument that the university itself is neutral. What changes a life is not the institution, but the choices made within it. The title refers not to the university, but to the decisions students make every single day they are there.</p>`,
quiz:[{q:"Who narrates The Life Changer?",opts:["Salma","Omar","Ummi, the mother","Dr. Samuel Johnson"],a:2,e:"The novel is narrated by Ummi, a mother who shares her own campus experiences to prepare her children."},{q:"What course does Salma study at ABU?",opts:["Medicine","Mass Communication","Law","Engineering"],a:2,e:"Salma gains admission to study Law at Ahmadu Bello University."},{q:"What does the novel identify as the main challenge of campus life?",opts:["Academic workload","Daily choices around temptation and corruption","Distance from family","Inadequate facilities"],a:1,e:"The novel is about the daily choices students face — temptation, peer pressure, harassment, and corruption."},{q:"What is the significance of the title?",opts:["It refers to ABU as transformative","It refers to Salma's transformation","It refers to the daily choices students make","It refers to Ummi's decision to educate her children"],a:2,e:"The title refers to choices — the novel argues what changes a life is the decisions made within it."},{q:"Who is Omar in the novel?",opts:["Salma's boyfriend","Ummi's son about to enter ABU","A corrupt lecturer","Salma's roommate"],a:1,e:"Omar is Ummi's son who has just gained admission to the same university his sister Salma attends."}]}
];

let cur=null,tab='read',qi=0,qs=0;
const L=['A','B','C','D'];

function buildNav(){
  document.getElementById('book-nav').innerHTML=BOOKS.map(b=>`<div class="ni" id="nb${b.id}" onclick="openBook(${b.id})">
    <div class="dot" style="background:${b.clr}"></div>
    <div><div class="nl">${b.title}</div><div class="ng">${b.genre.split(' · ')[0]}</div></div>
  </div>`).join('');
}
function buildGrid(){
  document.getElementById('book-grid').innerHTML=BOOKS.map((b,i)=>`
    <div class="tile anim a${Math.min(i+1,8)}" onclick="openBook(${b.id})">
      <div class="tcover" style="background:${b.clr}">
        ${b.badge?`<div class="tcover-badge">${b.badge}</div>`:''}
        <div class="ttitle">${b.title}</div>
      </div>
      <div class="tinfo">
        <div class="tauthor">${b.author}</div>
        <span class="tgenre" style="background:${b.clr}18;color:${b.clr};border:0.5px solid ${b.clr}40">${b.genre.split(' · ')[0]}</span>
      </div>
    </div>`).join('');
}
function showHome(){
  cur=null;
  ['home','reader-pane','summary-pane','quiz-pane'].forEach((id,i)=>document.getElementById(id).style.display=i===0?'block':'none');
  document.getElementById('tab-strip').style.display='none';
  document.getElementById('top-title').textContent='My Reading Shelf';
  document.getElementById('prog').style.width='0%';
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-home').classList.add('active');
}
function openBook(id){
  cur=BOOKS[id];
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.getElementById('nb'+id).classList.add('active');
  document.getElementById('tab-strip').style.display='flex';
  document.getElementById('home').style.display='none';
  tab='read';render();
}
function sw(t){tab=t;render();}
function render(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tab')[['read','summary','quiz'].indexOf(tab)].classList.add('on');
  ['reader-pane','summary-pane','quiz-pane'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('top-title').textContent=cur.title;
  if(tab==='read')renderRead();
  if(tab==='summary')renderSum();
  if(tab==='quiz'){qi=0;qs=0;renderQuiz();}
}
function renderRead(){
  document.getElementById('prog').style.width='30%';
  const p=document.getElementById('reader-pane');
  p.style.display='block';
  p.innerHTML=`<div class="rprose anim">${cur.content}</div>
  <div class="done-bar anim a3"><p>Done reading? Explore the summary or test yourself.</p>
  <div class="brow"><button class="btn btn-o" onclick="sw('summary')">View Summary</button><button class="btn btn-p" onclick="sw('quiz')">Take Quiz</button></div></div>`;
}
function renderSum(){
  document.getElementById('prog').style.width='60%';
  const s=cur.summary,p=document.getElementById('summary-pane');
  p.style.display='block';
  p.innerHTML=`<div class="sbk anim">
    <div class="scov" style="background:${cur.clr}"></div>
    <div><h2>${cur.title}</h2><div class="sby">by ${cur.author}</div>
    <span style="font-size:.65rem;padding:2px 9px;border-radius:20px;background:${cur.clr}18;color:${cur.clr};border:0.5px solid ${cur.clr}40;margin-top:6px;display:inline-block">${cur.genre}</span></div>
  </div>
  <div class="scard anim a1"><div class="slabel">Overview</div><p>${s.ov}</p></div>
  <div class="scard anim a2"><div class="slabel">Key themes</div><div class="trow">${s.themes.map(t=>`<span class="tpill">${t}</span>`).join('')}</div></div>
  <div class="scard anim a3"><div class="slabel">Central message</div><p>${s.msg}</p></div>
  <div class="scard anim a4"><div class="slabel">Notable quotes</div>${s.quotes.map(q=>`<div class="qblock"><p>"${q.t}"</p><div class="qattr">— ${q.a}</div></div>`).join('')}</div>`;
}
function renderQuiz(){
  const p=document.getElementById('quiz-pane');
  p.style.display='block';
  if(qi>=cur.quiz.length){
    const pct=Math.round((qs/cur.quiz.length)*100);
    const msg=pct>=80?'Excellent! You know this novel well.':pct>=60?'Good effort! Review the chapters.':'Keep reading — you\'ll get there!';
    p.innerHTML=`<div class="scoreend"><div class="sbig">${qs}/${cur.quiz.length}</div><div class="smsg">${msg}</div><div class="spct">${pct}% correct</div>
    <div class="brow" style="margin-top:1.25rem"><button class="btn btn-o" onclick="qi=0;qs=0;renderQuiz()">Retake</button><button class="btn btn-p" onclick="sw('read')">Back to Reading</button></div></div>`;
    document.getElementById('prog').style.width='100%';
    return;
  }
  const q=cur.quiz[qi];
  document.getElementById('prog').style.width=Math.round((qi/cur.quiz.length)*100)+'%';
  p.innerHTML=`<div class="qztop anim"><div class="qzctr">Question ${qi+1} of ${cur.quiz.length}</div><div class="qzlive">${qs} correct</div></div>
  <div class="qzq anim a1">${q.q}</div>
  <div id="opts" class="anim a2">${q.opts.map((o,i)=>`<button class="obt" onclick="ans(${i})"><span class="oltr">${L[i]}</span>${o}</button>`).join('')}</div>
  <div class="fb" id="fb"></div>
  <div class="qnav" id="qnav"><button class="btn btn-p" onclick="qi++;renderQuiz()">${qi+1<cur.quiz.length?'Next question':'See results'}</button></div>`;
}
function ans(i){
  const q=cur.quiz[qi];
  document.querySelectorAll('.obt').forEach(b=>b.classList.add('lk'));
  const opts=document.querySelectorAll('.obt');
  const fb=document.getElementById('fb');
  if(i===q.a){qs++;opts[i].classList.add('ok');fb.className='fb ok';fb.innerHTML='<strong>Correct!</strong> '+q.e;}
  else{opts[i].classList.add('no');opts[q.a].classList.add('ok');fb.className='fb no';fb.innerHTML='<strong>Not quite.</strong> '+q.e;}
  fb.style.display='block';
  document.getElementById('qnav').style.display='flex';
}
buildNav();buildGrid();
</script>
</body>
</html>
